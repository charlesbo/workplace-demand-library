<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>职场需求库</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="app" class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="text-xl font-bold px-4 py-6">📊 职场需求库</h1>
      </div>
      <nav class="sidebar-nav">
        <a v-for="item in navItems" :key="item.key"
           class="nav-item" :class="{ active: currentPage === item.key }"
           @click="currentPage = item.key">
          <span class="nav-icon">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 ml-56">
      <!-- Top Bar -->
      <header class="topbar">
        <div class="flex items-center gap-4 flex-1">
          <h2 class="text-lg font-semibold text-gray-700">{{ currentPageLabel }}</h2>
          <div class="ml-auto flex items-center gap-3">
            <div class="relative">
              <input type="text" v-model="globalSearch" @keyup.enter="handleGlobalSearch"
                     placeholder="搜索需求、文章..."
                     class="pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 w-64">
              <span class="absolute left-3 top-2.5 text-gray-400 text-sm">🔍</span>
            </div>
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <main class="p-6">
        <component :is="currentPage"></component>
      </main>
    </div>

    <!-- Modal Overlay -->
    <modal v-if="showModal" :title="modalTitle" @close="showModal = false">
      <component :is="modalContent" v-bind="modalProps"></component>
    </modal>
  </div>

  <script src="app.js"></script>
</body>
</html>
